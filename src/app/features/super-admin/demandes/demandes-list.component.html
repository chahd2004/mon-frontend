<div class="demandes-container">
  <p-toast></p-toast>

  <div class="page-header">
    <h1>Gestion des demandes d'inscription</h1>
    <p>Approuvez ou rejetez les demandes d'entreprise</p>
  </div>

  <div class="filter-section">
    <div class="search-container">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Rechercher par entreprise ou email..."
        [(ngModel)]="searchTerm"
        (input)="onSearch()"
        class="search-input"
      />
    </div>
    <p-dropdown
      [options]="statusOptions"
      optionLabel="label"
      optionValue="value"
      [(ngModel)]="selectedStatus"
      (onChange)="onStatusChange()"
      placeholder="Filtrer par statut"
      class="status-dropdown"
    ></p-dropdown>

  </div>

  <div class="table-container">
    <p-table
      [value]="filteredDemandes"
      [loading]="isLoading"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="false"
      responsiveLayout="scroll"
      styleClass="p-datatable-striped"
    >
      <ng-template pTemplate="header">
        <tr class="table-header">
          <th pSortableColumn="raisonSociale">Entreprise <p-sortIcon field="raisonSociale"></p-sortIcon></th>
          <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
          <th pSortableColumn="region">Région <p-sortIcon field="region"></p-sortIcon></th>
          <th pSortableColumn="status">Statut <p-sortIcon field="status"></p-sortIcon></th>
          <th pSortableColumn="dateSoumission">Date <p-sortIcon field="dateSoumission"></p-sortIcon></th>
          <th style="width: 150px; text-align: center;">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-demande>
        <tr>
          <td>
            <strong>{{ demande.raisonSociale }}</strong><br/>
            <small class="text-muted">{{ demande.code }}</small>
          </td>
          <td>{{ demande.email }}</td>
          <td>{{ demande.region }}</td>
          <td>
            <p-tag
              [value]="getStatusLabel(demande.status)"
              [severity]="getStatusSeverity(demande.status)"
            ></p-tag>
          </td>
          <td>{{ demande.dateSoumission | date: 'dd/MM/yyyy' }}</td>
          <td>
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-eye"
                pTooltip="Voir détails"
                tooltipPosition="top"
                class="p-button-text p-button-info"
                (click)="viewDetails(demande.id)"
              ></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-message">
            <i class="pi pi-inbox"></i>
            <p>Aucune demande trouvée</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
