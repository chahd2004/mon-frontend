<div class="statistiques-container">
  <div class="page-header">
    <h1>👑 SUPER ADMIN - Tableau de bord</h1>
  </div>

  <!-- KPI Cards Grid -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon users">
        <i class="pi pi-users"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">USERS</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ usersCount | number }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon clients">
        <i class="pi pi-users"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">CLIENTS</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ clientsCount | number }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon emetteurs">
        <i class="pi pi-briefcase"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">EMETTEURS</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ emetteursCount | number }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon factures">
        <i class="pi pi-file"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">FACTURES</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ facturesCount | number }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon ca">
        <i class="pi pi-wallet"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">CA TOTAL</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ caTotalCount }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-section">
    <p-card class="chart-card">
      <ng-template pTemplate="header">
        <div class="chart-header">
          <h3>📊 ÉVOLUTION DES INSCRIPTIONS</h3>
        </div>
      </ng-template>
      <p-chart type="line" [data]="chartDataRequests" [options]="chartOptions"></p-chart>
    </p-card>
  </div>
</div>
