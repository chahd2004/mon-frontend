<div class="statistiques-container">
  <div class="page-header">
    <div class="welcome-section">
      <div>
        <h1 class="welcome-title">Bienvenue <span class="admin-name">{{ userFullName() }}</span></h1>
        <h2>SUPER ADMIN - Tableau de bord</h2>
      </div>
    </div>
  </div>

  <!-- KPI Cards Grid -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon users">
        <i class="pi pi-users"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">USERS</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ usersCount | number }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon factures">
        <i class="pi pi-file"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">FACTURES</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ facturesCount | number }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon emetteurs">
        <i class="pi pi-building"></i>
      </div>
      <div class="kpi-content">
        <p class="kpi-label">ENTREPRISES</p>
        <p class="kpi-value" *ngIf="!isLoading">{{ emetteursCount | number }}</p>
        <p-skeleton *ngIf="isLoading" width="80%" height="2rem"></p-skeleton>
      </div>
    </div>
  </div>

</div>
