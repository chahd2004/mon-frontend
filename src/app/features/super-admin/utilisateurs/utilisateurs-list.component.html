<div class="utilisateurs-container">
  <div class="page-header">
    <h1>Gestion des utilisateurs</h1>
    <p>Gérez tous les utilisateurs de la plateforme</p>
  </div>

  <div class="filter-section">
    <div class="search-container">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Rechercher par nom, prénom ou email..."
        [(ngModel)]="searchTerm"
        (input)="onSearch(searchTerm)"
        class="search-input"
      />
    </div>
  </div>

  <div class="table-container">
    <p-table
      [value]="filteredUtilisateurs"
      [loading]="isLoading"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Affichage {first} à {last} sur {totalRecords} utilisateurs"
      responsiveLayout="scroll"
      styleClass="p-datatable-striped"
    >
      <ng-template pTemplate="header">
        <tr class="table-header">
          <th pSortableColumn="prenom">Nom <p-sortIcon field="prenom"></p-sortIcon></th>
          <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
          <th pSortableColumn="role">Rôle <p-sortIcon field="role"></p-sortIcon></th>
          <th pSortableColumn="accountStatus">Statut <p-sortIcon field="accountStatus"></p-sortIcon></th>
          <th style="width: 150px">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <strong>{{ user.prenom }} {{ user.nom }}</strong>
          </td>
          <td>
            <span class="email">{{ user.email }}</span>
          </td>
          <td>
            <span class="role">{{ user.role | roleLabel }}</span>
          </td>
          <td>
            <p-tag
              [value]="(user.accountStatus | statusBadge)?.label"
              [severity]="(user.accountStatus | statusBadge)?.severity"
              [icon]="(user.accountStatus | statusBadge)?.icon"
            ></p-tag>
          </td>
          <td>
            <button
              pButton
              icon="pi pi-pencil"
              rounded
              text
              (click)="editUser(user.id)"
              pTooltip="Modifier"
              tooltipPosition="top"
              class="action-edit"
            ></button>
            <button
              *ngIf="user.enabled"
              pButton
              icon="pi pi-ban"
              rounded
              text
              (click)="disableUser(user.id)"
              pTooltip="Désactiver"
              tooltipPosition="top"
              class="action-disable"
            ></button>
            <button
              *ngIf="!user.enabled"
              pButton
              icon="pi pi-check"
              rounded
              text
              (click)="enableUser(user.id)"
              pTooltip="Activer"
              tooltipPosition="top"
              class="action-enable"
            ></button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="empty-message">
            <i class="pi pi-users"></i>
            <p>Aucun utilisateur trouvé</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
