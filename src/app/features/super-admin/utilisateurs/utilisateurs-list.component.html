<div class="utilisateurs-container">
  <!-- En-tête amélioré -->
  <div class="page-header">
    <div class="header-content">
      <h1>
        <i class="pi pi-users"></i> Gestion des utilisateurs
      </h1>
      <p>Gérez tous les utilisateurs de la plateforme</p>
    </div>
    <button
      pButton
      type="button"
      icon="pi pi-plus"
      label="Créer Super Admin"
      class="p-button-success create-btn"
      routerLink="/super-admin/utilisateurs/nouveau"
    ></button>
  </div>

  <!-- Barre de recherche et filtres -->
  <div class="filters-bar">
    <div class="search-section">
      <span class="p-input-icon-left search-wrapper">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          placeholder="Rechercher par nom, prénom ou email..."
          [(ngModel)]="searchTerm"
          (input)="onSearch(searchTerm)"
          class="search-input"
        />
      </span>
    </div>


  </div>

  <!-- Table des utilisateurs -->
  <div class="table-container">
    <p-table
      [value]="filteredUtilisateurs"
      [loading]="isLoading"
      [paginator]="false"
      responsiveLayout="scroll"
      styleClass="p-datatable-striped users-table"
      [tableStyle]="{ 'min-width': '50rem' }"
    >
      <!-- En-tête -->
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="prenom" class="col-nom">
            Nom <p-sortIcon field="prenom"></p-sortIcon>
          </th>
          <th pSortableColumn="email" class="col-email">
            Email <p-sortIcon field="email"></p-sortIcon>
          </th>
          <th pSortableColumn="role" class="col-role">
            Rôle <p-sortIcon field="role"></p-sortIcon>
          </th>
          <th class="col-entreprise">Entreprise</th>
          <th pSortableColumn="accountStatus" class="col-statut">
            Statut <p-sortIcon field="accountStatus"></p-sortIcon>
          </th>
          <th class="col-actions">Actions</th>
        </tr>
      </ng-template>

      <!-- Lignes -->
      <ng-template pTemplate="body" let-user>
        <tr>
          <!-- Nom -->
          <td class="col-nom">
            <div class="user-name">
              <span class="name-text"><strong>{{ user.prenom }}</strong></span>
              <span class="name-text"><strong>{{ user.nom }}</strong></span>
            </div>
          </td>

          <!-- Email -->
          <td class="col-email">
            <span class="email-text">{{ user.email }}</span>
          </td>

          <!-- Rôle -->
          <td class="col-role">
            <span [ngClass]="'role-badge role-' + user.role?.toLowerCase()">
              {{ user.role | roleLabel }}
            </span>
          </td>

          <!-- Entreprise -->
          <td class="col-entreprise">
            <span class="entreprise-text">{{ getEntrepriseName(user) || '-' }}</span>
          </td>

          <!-- Statut -->
          <td class="col-statut">
            <span [ngClass]="'status-badge status-' + getStatusClass(user.accountStatus)">
              {{ getStatusLabel(user.accountStatus) }}
            </span>
          </td>

          <!-- Actions -->
          <td class="col-actions">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="action-btn action-edit"
                pTooltip="Modifier"
                tooltipPosition="top"
                (click)="editUser(user.id)"
              ></button>
              <button
                pButton
                [icon]="user.enabled ? 'pi pi-ban' : 'pi pi-check'"
                [class]="user.enabled ? 'action-btn action-delete' : 'action-btn action-enable'"
                [pTooltip]="user.enabled ? 'Désactiver' : 'Activer'"
                tooltipPosition="top"
                (click)="user.enabled ? disableUser(user.id) : enableUser(user.id)"
              ></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <!-- Message vide -->
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-message">
            <div class="empty-content">
              <i class="pi pi-inbox"></i>
              <p>Aucun utilisateur trouvé</p>
            </div>
          </td>
        </tr>
      </ng-template>

      <!-- Loading -->
      <ng-template pTemplate="loadingbody">
        <tr *ngFor="let i of [1, 2, 3, 4, 5]">
          <td colspan="6">
            <p-skeleton height="2rem"></p-skeleton>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
