<div class="profil">
  <div class="profil-header">
    <h2>Mon Profil</h2>
    <button 
      *ngIf="!editMode && profil"
      (click)="toggleEditMode()" 
      class="btn btn-primary">
      Modifier
    </button>
  </div>

  <div *ngIf="loading" class="loading-spinner">
    <p>Chargement du profil...</p>
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="!loading && profil" class="profil-container">
    <!-- View Mode -->
    <div *ngIf="!editMode" class="profil-view">
      <div class="profil-section">
        <div class="profil-item">
          <label>Nom</label>
          <p>{{ profil.nom }}</p>
        </div>
        <div class="profil-item">
          <label>Prénom</label>
          <p>{{ profil.prenom || '-' }}</p>
        </div>
      </div>

      <div class="profil-section">
        <div class="profil-item">
          <label>Email</label>
          <p>{{ profil.email }}</p>
        </div>
        <div class="profil-item">
          <label>Téléphone</label>
          <p>{{ profil.telephone || '-' }}</p>
        </div>
      </div>

      <div class="profil-section">
        <div class="profil-item">
          <label>Rôle</label>
          <p>{{ profil.role }}</p>
        </div>
        <div class="profil-item" *ngIf="profil.typeUser">
          <label>Type d'Utilisateur</label>
          <p>{{ profil.typeUser }}</p>
        </div>
      </div>

      <div class="profil-section">
        <div class="profil-item">
          <label>Statut du Compte</label>
          <span [ngClass]="['badge', 'status-' + (profil.accountStatus || 'active').toLowerCase()]">
            {{ profil.accountStatus || 'Actif' }}
          </span>
        </div>
        <div class="profil-item" *ngIf="profil.enabled !== undefined">
          <label>Compte Activé</label>
          <p>{{ profil.enabled ? 'Oui' : 'Non' }}</p>
        </div>
      </div>
    </div>

    <!-- Edit Mode -->
    <div *ngIf="editMode" class="profil-edit">
      <form class="edit-form">
        <div class="form-group">
          <label for="nom">Nom *</label>
          <input 
            id="nom"
            type="text" 
            [(ngModel)]="editForm.nom" 
            name="nom"
            class="form-control"
            required>
        </div>

        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input 
            id="prenom"
            type="text" 
            [(ngModel)]="editForm.prenom" 
            name="prenom"
            class="form-control">
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input 
            id="email"
            type="email" 
            [(ngModel)]="editForm.email" 
            name="email"
            class="form-control"
            required>
        </div>

        <div class="form-group">
          <label for="telephone">Téléphone</label>
          <input 
            id="telephone"
            type="tel" 
            [(ngModel)]="editForm.telephone" 
            name="telephone"
            class="form-control">
        </div>

        <div class="form-actions">
          <button (click)="saveProfile()" type="button" class="btn btn-success">
            Enregistrer
          </button>
          <button (click)="cancelEdit()" type="button" class="btn btn-secondary">
            Annuler
          </button>
        </div>
      </form>
    </div>
  </div>

  <div *ngIf="!loading && !profil && !error" class="no-data">
    <p>Profil non trouvé</p>
  </div>
</div>
