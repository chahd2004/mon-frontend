<div class="login-page">
  <p-toast></p-toast>

  <p-card class="login-card">
    <ng-template pTemplate="header">
      <div class="card-header">
        <h1>Connexion</h1>
      </div>
    </ng-template>

    <div class="form-container">
      <div class="form-group">
        <label for="email">Email</label>
        <input pInputText id="email" [(ngModel)]="email" type="email" placeholder="votre@email.com" [disabled]="loading"
          (keyup.enter)="login()" />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input pInputText id="password" [(ngModel)]="password" type="password" placeholder="Entrez votre mot de passe"
          [disabled]="loading" (keyup.enter)="login()" />
      </div>

      <div class="form-group checkbox">
        <p-checkbox [(ngModel)]="rememberMe" [binary]="true"></p-checkbox>
        <label>Se souvenir de moi</label>
      </div>

      <p-button label="Se connecter" icon="pi pi-sign-in" (click)="login()" [loading]="loading" [disabled]="loading"
        styleClass="w-full p-button-primary"></p-button>
    </div>

    <ng-template pTemplate="footer">
      <div class="card-footer">
        <p *ngIf="isAdminContext">
          Pas encore inscrit?
          <a (click)="navigateToRegister()" class="link">Créer un compte</a>
        </p>
        <p>
          <a (click)="navigateToHome()" class="link">← Retour à l'accueil</a>
        </p>
      </div>
    </ng-template>
  </p-card>
</div>
