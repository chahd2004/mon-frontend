<section class="page">
  <h1>{{ 'PARAMETRES.PROFIL' | translate }}</h1>
  <div class="form">
    <input [(ngModel)]="nom" [placeholder]="'PARAMETRES.MON_PROFIL.NOM' | translate" />
    <input [(ngModel)]="prenom" [placeholder]="'PARAMETRES.MON_PROFIL.PRENOM' | translate" />
    <input [(ngModel)]="email" [placeholder]="'PARAMETRES.MON_PROFIL.EMAIL' | translate" />
    <button (click)="enregistrer()">{{ 'COMMON.SAVE' | translate }}</button>
  </div>
</section>
