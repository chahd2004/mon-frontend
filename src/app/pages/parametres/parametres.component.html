<!-- src/app/pages/parametres/parametres.component.html -->
<div class="parametres-container">

  <!-- En-tête -->
  <div class="header-section">
    <div class="header-left">
      <button class="back-btn" (click)="retourDashboard()" pTooltip="Retour au dashboard">
        <i class="pi pi-arrow-left"></i>
      </button>
      <h1><i class="pi pi-cog"></i> {{ 'PARAMETRES.TITLE' | translate }}</h1>
    </div>
  </div>

  <!-- Tabs -->
  <p-tabView>

    <!-- ===== 1. PROFIL ===== -->
    <p-tabPanel [header]="'PARAMETRES.PROFIL' | translate" leftIcon="pi pi-user">
      <div class="tab-content profile-tab-content">

        <!-- SECTION: Mon Profil -->
        <div class="profile-card">
          <div class="profile-card-header">
            <i class="pi pi-user header-icon"></i>
            <h3>MON PROFIL</h3>
          </div>
          <div class="profile-card-body">
            <div class="form-group">
              <label>Email</label>
              <div class="email-field">
                <input type="email" pInputText [(ngModel)]="userProfile.email" class="param-input" disabled>
                <i class="pi pi-lock lock-icon"></i>
              </div>
            </div>
            <div class="form-group">
              <label>Prénom</label>
              <input type="text" pInputText [(ngModel)]="userProfile.prenom" class="param-input" placeholder="Votre prénom">
            </div>
            <div class="form-group">
              <label>Nom</label>
              <input type="text" pInputText [(ngModel)]="userProfile.nom" class="param-input" placeholder="Votre nom">
            </div>
            <button pButton label="Sauvegarder" class="p-button-success profile-save-btn"
              (click)="sauvegarderProfil()">
            </button>
          </div>
        </div>

        <!-- SECTION: Mot de Passe -->
        <div class="profile-card">
          <div class="profile-card-header">
            <i class="pi pi-lock header-icon"></i>
            <h3>MOT DE PASSE</h3>
          </div>
          <div class="profile-card-body">
            <div class="form-group">
              <label>Actuel</label>
              <p-password [(ngModel)]="passwordData.ancien" [feedback]="false" [toggleMask]="true"
                styleClass="password-field" inputStyleClass="param-input" placeholder="••••••••••"></p-password>
            </div>
            <div class="form-group">
              <label>Nouveau</label>
              <p-password [(ngModel)]="passwordData.nouveau" [feedback]="true" [toggleMask]="true"
                styleClass="password-field" inputStyleClass="param-input" placeholder="••••••••••"></p-password>
            </div>
            <div class="form-group">
              <label>Confirmer</label>
              <p-password [(ngModel)]="passwordData.confirmation" [feedback]="false" [toggleMask]="true"
                styleClass="password-field" inputStyleClass="param-input" placeholder="••••••••••"></p-password>
            </div>
            <button pButton label="Changer" class="p-button-warning profile-save-btn"
              (click)="changerMotDePasse()">
            </button>
          </div>
        </div>

        <!-- SECTION: Entreprise -->
        <div class="profile-card" *ngIf="!isSuperAdmin()">
          <div class="profile-card-header">
            <i class="pi pi-building header-icon"></i>
            <h3>ENTREPRISE</h3>
          </div>
          <div class="profile-card-body">
            <div class="form-group">
              <label>Raison sociale</label>
              <input type="text" pInputText [(ngModel)]="societeInfo.raison_sociale" class="param-input" placeholder="Acme SARL">
            </div>
            <div class="form-group">
              <label>Téléphone</label>
              <input type="text" pInputText [(ngModel)]="societeInfo.telephone" class="param-input" placeholder="+216 71 123 456">
            </div>
            <div class="form-group">
              <label>Adresse</label>
              <input type="text" pInputText [(ngModel)]="societeInfo.adresse" class="param-input" placeholder="123 Rue de la Liberté, Tunis">
            </div>
            <div class="form-group">
              <label>IBAN</label>
              <input type="text" pInputText [(ngModel)]="societeInfo.iban" class="param-input" placeholder="TN59 1234 5678">
            </div>
            <button pButton label="Sauvegarder" class="p-button-success profile-save-btn"
              (click)="sauvegarderSociete()">
            </button>
          </div>
        </div>

      </div>
    </p-tabPanel>

    <!-- ===== 2. PRÉFÉRENCES ===== -->
    <p-tabPanel [header]="'PARAMETRES.PREFERENCES' | translate" leftIcon="pi pi-sliders-h">
      <div class="tab-content">
        <h3>{{ 'PARAMETRES.PREFERENCES' | translate }}</h3>

        <div class="preferences-grid">

          <!-- LANGUE -->
          <div class="pref-item">
            <div class="pref-label">
              <i class="pi pi-globe pref-icon"></i>
              <div>
                <span class="pref-title">{{ 'PARAMETRES.LANGUE' | translate }}</span>
                <span class="pref-hint">Appliquée immédiatement</span>
              </div>
            </div>
            <p-selectButton
              [options]="langues"
              [(ngModel)]="preferences.langue"
              optionLabel="label"
              optionValue="value"
              (onChange)="onLangueChange()">
            </p-selectButton>
            <div class="pref-preview">
              <span *ngIf="preferences.langue === 'fr'">🇫🇷 Interface en Français — direction gauche → droite</span>
              <span *ngIf="preferences.langue === 'en'">🇬🇧 Interface in English — left to right direction</span>
            </div>
          </div>


        </div>

      </div>
    </p-tabPanel>

  </p-tabView>

</div>

<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>
