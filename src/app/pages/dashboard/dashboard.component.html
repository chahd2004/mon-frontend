<!-- src/app/pages/dashboard/dashboard.component.html -->
<div class="accueil-container">
  <!-- En-tête -->
  <div class="header-section">
    <div>
      <h2 class="enterprise-name" *ngIf="raisonSociale">{{ raisonSociale }}</h2>
      <h1>Tableau de bord</h1>
      <p class="subtitle">Bienvenue sur votre espace de gestion</p>
    </div>
    <div class="header-actions">
      <button class="btn-outline" (click)="retourAccueil()">
        <i class="pi pi-home"></i> Accueil
      </button>
      <button class="btn-outline" (click)="rafraichir()">
        <i class="pi pi-refresh"></i> Actualiser
      </button>
    </div>
  </div>

  <!-- Spinner -->
  <div *ngIf="loading" class="loading-center">
    <p-progressSpinner strokeWidth="4"></p-progressSpinner>
  </div>

  <!-- CARTES STATISTIQUES -->
  <div class="stats-grid" *ngIf="!loading">
    <div class="stat-card blue" (click)="naviguerVersFactures()">
      <div class="stat-icon"><i class="pi pi-file"></i></div>
      <div class="stat-info">
        <span class="stat-value">{{ totalFactures }}</span>
        <span class="stat-label">Total Factures</span>
      </div>
    </div>
    <div class="stat-card green" (click)="naviguerVersClients()">
      <div class="stat-icon"><i class="pi pi-users"></i></div>
      <div class="stat-info">
        <span class="stat-value">{{ totalClients }}</span>
        <span class="stat-label">Total Clients</span>
      </div>
    </div>
    <div class="stat-card purple">
      <div class="stat-icon"><i class="pi pi-wallet"></i></div>
      <div class="stat-info">
        <span class="stat-value">{{ formatMontant(chiffreAffaires, true) }}</span>
        <span class="stat-label">Chiffre d'affaires</span>
      </div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon"><i class="pi pi-exclamation-triangle"></i></div>
      <div class="stat-info">
        <span class="stat-value">{{ facturesImpayees }}</span>
        <span class="stat-label">Factures impayées</span>
      </div>
    </div>
  </div>

  <!-- GRAPHIQUE + DERNIÈRES FACTURES -->
  <div class="content-grid" *ngIf="!loading">
    <div class="chart-card">
      <div class="card-header">
        <h3><i class="pi pi-chart-line"></i> Évolution mensuelle</h3>
      </div>
      <div class="card-body">
        <p-chart type="line" [data]="chartData" [options]="chartOptions" height="300px"></p-chart>
        <div *ngIf="chartData.datasets[0].data.length === 0" class="chart-empty">
          <p>Aucune donnée disponible</p>
        </div>
      </div>
    </div>


  </div>


</div>
