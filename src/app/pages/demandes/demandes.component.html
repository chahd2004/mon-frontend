<p-toast></p-toast>

<section class="page">
  <header class="page-header">
    <h1>Demandes</h1>
    <span class="badge">{{ pendingCount }} en attente</span>
    <button class="btn-refresh" (click)="loadDemandes()">↻ Actualiser</button>
  </header>

  <!-- Chargement -->
  <div class="loading" *ngIf="isLoading">
    <p-progressSpinner strokeWidth="4" styleClass="spinner-sm"></p-progressSpinner>
    <p>Chargement...</p>
  </div>

  <!-- Liste vide -->
  <div class="empty" *ngIf="!isLoading && demandes.length === 0">
    <p>📭 Aucune demande trouvée.</p>
  </div>

  <!-- Cartes des demandes -->
  <div class="card" *ngFor="let d of demandes">
    <div class="row">
      <div>
        <h3>{{ d.raisonSociale }}</h3>
        <p>{{ d.email }} • {{ d.dateSoumission | date:'yyyy-MM-dd' }}</p>
      </div>
      <span class="status" [class]="getStatutClass(d.status)">
        {{ getStatutLabel(d.status) }}
      </span>
    </div>

    <div class="actions">
      <button class="btn secondary" (click)="voirDetail(d.id)">Détail</button>
      <button
        class="btn success"
        (click)="approuver(d)"
        [disabled]="!isPending(d.status) || actionLoadingId === d.id"
      >{{ actionLoadingId === d.id ? '...' : 'Approuver' }}</button>
      <button
        class="btn danger"
        (click)="rejeter(d)"
        [disabled]="!isPending(d.status) || actionLoadingId === d.id"
      >Rejeter</button>
    </div>
  </div>
</section>
