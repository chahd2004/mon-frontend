<div class="commande-create-page" *ngIf="!loading; else loadingTpl">
  <button class="back-link" (click)="retourAuxCommandes()">&larr; Retour aux commandes</button>
  <h1 class="title">Nouvelle commande</h1>

  <div class="card">
    <h2>Informations generales</h2>
    <div class="grid two-cols">
      <div class="field">
        <label>Client <span class="required">*</span></label>
        <div class="inline-row">
          <select [(ngModel)]="clientId" [ngModelOptions]="{ standalone: true }">
            <option [ngValue]="null">Rechercher client</option>
            <option *ngFor="let c of clients" [ngValue]="c.id">{{ c.raisonSociale }}</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Date d'emission</label>
        <input type="date" [(ngModel)]="dateEmission" [ngModelOptions]="{ standalone: true }" />
      </div>

      <div class="field">
        <label>Mode de paiement</label>
        <select [(ngModel)]="modePaiement" [ngModelOptions]="{ standalone: true }">
          <option value="VIREMENT">Virement</option>
          <option value="CHEQUE">Cheque</option>
          <option value="ESPECES">Especes</option>
          <option value="CARTE">Carte</option>
        </select>
      </div>

      <div class="field">
        <label>Condition de paiement</label>
        <input type="text" [(ngModel)]="conditionPaiement" [ngModelOptions]="{ standalone: true }" placeholder="Ex: 30 jours net" />
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Lignes de commande</h2>
    <div class="lignes-list">
      <div class="ligne-form" *ngFor="let ligne of lignes; let i = index">
        <select [(ngModel)]="ligne.produitId" [ngModelOptions]="{ standalone: true }" class="product-select">
          <option [ngValue]="null">Choisir un produit</option>
          <option *ngFor="let p of produits" [ngValue]="p.id">{{ p.designation }}</option>
        </select>
        <input type="number" [(ngModel)]="ligne.quantite" [ngModelOptions]="{ standalone: true }" min="1" placeholder="Quantite" class="quantity-input" />
        <button type="button" class="secondary" (click)="supprimerLigne(i)" *ngIf="lignes.length > 1">Supprimer</button>
      </div>
    </div>
    <button type="button" (click)="ajouterLigne()" class="secondary">+ Ajouter une ligne</button>
  </div>

  <div class="card">
    <h2>Notes</h2>
    <textarea [(ngModel)]="notes" [ngModelOptions]="{ standalone: true }" placeholder="Notes supplementaires..."></textarea>
  </div>

  <div *ngIf="errorMessage" class="message error">{{ errorMessage }}</div>

  <div class="card footer-actions">
    <button type="button" (click)="enregistrerBrouillon()" [disabled]="loading" class="primary">Enregistrer brouillon</button>
  </div>
</div>

<ng-template #loadingTpl>
  <div class="loading">Chargement...</div>
</ng-template>
